<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 13px;
      color: #a0c4ff;
    }
    #status {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 10px;
      min-height: 18px;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #0f3460;
      color: #a0c4ff;
      border: 1px solid #1a5276;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    button:hover { background: #1a5276; }
  </style>
</head>
<body>
  <h3>🎬 Video Subtitle Grabber <span style="font-size:10px;opacity:0.5">v2.2.0</span></h3>
  <div id="status">Поиск видео...</div>
  <button id="btn-toggle">Показать / скрыть панель</button>
  <script src="popup.js"></script>
</body>
</html>
