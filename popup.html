<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 13px;
      color: #a0c4ff;
    }
    #status {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 10px;
      min-height: 18px;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #0f3460;
      color: #a0c4ff;
      border: 1px solid #1a5276;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    button:hover { background: #1a5276; }
    #btn-lang {
      width: auto;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 600;
      background: none;
      border: 1px solid #2a3a5a;
      color: #9ab;
    }
    #btn-lang:hover { background: #0f3460; color: #a0c4ff; }
    .hdr-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
    .hdr-row h3 { margin: 0; }
  </style>
</head>
<body>
  <div class="hdr-row">
    <h3>🎬 Video Subtitle Grabber <span id="ver" style="font-size:10px;opacity:0.5"></span></h3>
    <button id="btn-lang" title=""></button>
  </div>
  <div id="status"></div>
  <button id="btn-toggle"></button>
  <div id="update" style="font-size:11px;margin-top:10px;text-align:center;"></div>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
