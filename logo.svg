<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#16213e"/>

  <!-- Film strip left -->
  <rect x="10" y="20" width="14" height="88" rx="4" fill="#0f3460"/>
  <rect x="12" y="26" width="10" height="10" rx="2" fill="#1a1a2e"/>
  <rect x="12" y="42" width="10" height="10" rx="2" fill="#1a1a2e"/>
  <rect x="12" y="58" width="10" height="10" rx="2" fill="#1a1a2e"/>
  <rect x="12" y="74" width="10" height="10" rx="2" fill="#1a1a2e"/>
  <rect x="12" y="90" width="10" height="10" rx="2" fill="#1a1a2e"/>

  <!-- Film strip right -->
  <rect x="104" y="20" width="14" height="88" rx="4" fill="#0f3460"/>
  <rect x="106" y="26" width="10" height="10" rx="2" fill="#1a1a2e"/>
  <rect x="106" y="42" width="10" height="10" rx="2" fill="#1a1a2e"/>
  <rect x="106" y="58" width="10" height="10" rx="2" fill="#1a1a2e"/>
  <rect x="106" y="74" width="10" height="10" rx="2" fill="#1a1a2e"/>
  <rect x="106" y="90" width="10" height="10" rx="2" fill="#1a1a2e"/>

  <!-- Screen area -->
  <rect x="26" y="20" width="76" height="62" rx="5" fill="#0c1628"/>

  <!-- Play button -->
  <polygon points="50,34 50,68 82,51" fill="#a0c4ff" opacity="0.85"/>

  <!-- Subtitle lines -->
  <rect x="30" y="88" width="68" height="6" rx="3" fill="#1a8a50"/>
  <rect x="40" y="98" width="48" height="5" rx="2.5" fill="#1a8a50" opacity="0.6"/>

  <!-- Download arrow -->
  <g transform="translate(95, 88)">
    <circle cx="0" cy="0" r="12" fill="#1a8a50"/>
    <polygon points="-4,-5 4,-5 4,1 7,1 0,8 -7,1 -4,1" fill="#fff"/>
  </g>
</svg>
